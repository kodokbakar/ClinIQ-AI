version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g bun@1.3.14
            - bun install
        build:
          commands:
            - bunx turbo run build --filter=web
            - echo "=== STANDALONE OUTPUT ===" && find apps/web/.next/standalone -type f | head -50
            - echo "=== .next ROOT ===" && ls -la apps/web/.next/
            - echo "=== REQUIRED FILE ===" && ls -la apps/web/.next/required-server-files.json 2>/dev/null || echo "NOT FOUND AT ROOT"
            - echo "=== REQUIRED FILE IN STANDALONE ===" && ls -la apps/web/.next/standalone/apps/web/.next/required-server-files.json 2>/dev/null || echo "NOT FOUND IN STANDALONE"
      artifacts:
        baseDirectory: apps/web/.next/standalone/apps/web
        files:
          - '**/*'
          - '.next/**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
